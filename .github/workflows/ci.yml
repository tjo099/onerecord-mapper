name: CI

on:
  pull_request: { branches: [main] }
  push: { branches: [main] }

permissions: { contents: read }

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-bun:
    name: Test (Bun, shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix: { shard: [1, 2] }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: '1.3.11' }
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - name: Tests
        env:
          VITEST_SHARD: ${{ matrix.shard }}
          VITEST_SHARD_TOTAL: 2
        run: bun run test

  audit:
    name: Audit (deps + secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: '1.3.11' }
      - run: bun install --frozen-lockfile
      - name: bun audit (GHSA)
        run: bun audit
      - name: OSV scan (osv.dev)
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.5
        with:
          scan-args: |-
            --lockfile=./bun.lock
      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test-bun
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: '1.3.11' }
      - run: bun install --frozen-lockfile
      - run: bun run test:coverage
      - uses: actions/upload-artifact@v4
        with: { name: coverage, path: coverage/ }

  test-node:
    name: Smoke (Node ${{ matrix.node }} native ESM)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: test-bun
    strategy:
      fail-fast: false
      matrix: { node: [20, 22] }
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: '1.3.11' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ matrix.node }}' }
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Resolve built dist under Node native ESM
        run: |
          node --input-type=module -e "import('./dist/index.js').then(m => { if (!m.WaybillSchema) throw new Error('WaybillSchema missing'); console.log('ok node ${{ matrix.node }}, version', m.__VERSION__) })"

  api-surface:
    name: API surface (attw)
    runs-on: ubuntu-latest
    needs: test-bun
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: '1.3.11' }
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run api:check

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions: { actions: read, contents: read, security-events: write }
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with: { languages: javascript-typescript }
      - uses: github/codeql-action/analyze@v3
