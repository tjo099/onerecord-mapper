name: Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

permissions: { contents: write, id-token: write, attestations: write }

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0, fetch-tags: true }
      - name: Import maintainer GPG public key
        env:
          GPG_PUBLIC_KEY: ${{ secrets.MAINTAINER_GPG_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${GPG_PUBLIC_KEY:-}" ]; then
            echo "::error::MAINTAINER_GPG_PUBLIC_KEY secret is not configured. Add the maintainer's ASCII-armored GPG public key as a repository secret before tagging a release."
            exit 1
          fi
          printf '%s\n' "$GPG_PUBLIC_KEY" | gpg --import --batch
      - name: Verify signed tag
        run: |
          git tag -v ${{ github.ref_name }} 2>&1 | tee /tmp/tag-verify.txt
          grep -qE 'good signature|Good signature' /tmp/tag-verify.txt
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: '1.3.11' }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test:coverage
      # NE:ONE contract gate — deferred to v0.2 (Phase 14, Tasks 68-71)
      # docker-compose at test/contract/docker-compose.neone.yml ships then.
      - name: Build
        run: bun run build
      # The "verify committed dist" invariant was removed in v0.1.1 because
      # dist/ is gitignored and consumers run `prepare` (tsc) on install.
      # When v0.2 adds npm publish, registry tarball integrity replaces this
      # gate.
      - name: SBOM (syft)
        uses: anchore/sbom-action@v0
        with: { artifact-name: 'sbom-${{ github.ref_name }}.spdx.json', format: spdx-json }
      - name: SLSA provenance
        uses: actions/attest-build-provenance@v1
        with: { subject-path: 'dist/**' }
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sbom-${{ github.ref_name }}.spdx.json
            dist/**
