# test/contract/docker-compose.neone.yml
#
# Skeleton multi-service compose for the OLF NE:ONE Server in
# in-memory mode (no GraphDB, no MinIO bucket preload). This is the
# v0.2 STARTING POINT for portable contract-test infrastructure;
# the fully-portable variant (with bundled Keycloak realm config
# + GraphDB ontology + headless GitHub Actions runner config) is
# deferred to v0.3 (deferral G partial closure).
#
# To actually use this file you need the upstream Keycloak realm
# config (`neone-realms.json`) at `./keycloak/`. Obtain it from
# the OLF NE:ONE repo:
#
#   curl -fsSL -o test/contract/keycloak/neone-realms.json \
#     https://git.openlogisticsfoundation.org/wg-digitalaircargo/ne-one/-/raw/develop/src/main/docker-compose/keycloak/neone-realms.json
#
# (Not committed to this repo because it's OLF-licensed source code
# — bundling would require an Apache-2.0/OLF-v1.3 license-mixing
# review per OLF License v1.3 §4 distribution conditions.)
#
# Ports:
#   8080 — NE:ONE OneRecord API (Bearer token required)
#   8989 — Keycloak (realm `neone`, client `neone-client`)
#   6379 — Redis (NE:ONE cache)
#   9000 — MinIO S3 API
#   9090 — MinIO console (admin / admin123)
#
# Usage:
#   docker compose -f test/contract/docker-compose.neone.yml up -d --wait
#   bun run test:contract
#   docker compose -f test/contract/docker-compose.neone.yml down -v

version: "3"

services:
  neone:
    image: git.openlogisticsfoundation.org:5050/wg-digitalaircargo/ne-one:latest
    ports:
      - "8080:8080"
    environment:
      REPOSITORY_TYPE: in-memory
      QUARKUS_REST_CLIENT_NOTIFICATION_CLIENT_URL: http://mockserver:1080
      QUARKUS_REST_CLIENT_SUBSCRIPTION_CLIENT_URL: http://mockserver:1080
      QUARKUS_S3_ENDPOINT_OVERRIDE: http://minio:9000
      LO_ID_CONFIG_HOST: localhost
      LO_ID_CONFIG_SCHEME: http
      LO_ID_CONFIG_PORT: 8080
      # OIDC plumbing per the OLF fix-oidc.yml overlay (closes 3
      # undocumented gaps in the upstream develop-branch base compose).
      QUARKUS_OIDC_AUTH_SERVER_URL: http://keycloak-1:8080/realms/neone
      QUARKUS_OIDC_CLIENT_AUTH_SERVER_URL: http://keycloak-1:8080/realms/neone
      AUTH_ISSUERS_LOCAL_PUBLICKEY_LOCATION: http://keycloak-1:8080/realms/neone/protocol/openid-connect/certs
      AUTH_ISSUERS_LOCAL2_PUBLICKEY_LOCATION: http://keycloak-1:8080/realms/neone2/protocol/openid-connect/certs
      QUARKUS_OIDC_TOKEN_ISSUER: http://localhost:8989/realms/neone
      QUARKUS_OIDC_CLIENT_TOKEN_ISSUER: http://localhost:8989/realms/neone
      QUARKUS_REDIS_HOSTS: redis://redis:6379
    depends_on:
      redis:
        condition: service_started
      keycloak-1:
        condition: service_healthy
      minio:
        condition: service_started
    restart: on-failure:10
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/q/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 24

  keycloak-1:
    image: quay.io/keycloak/keycloak:22.0
    ports:
      - "8989:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8989
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - "./keycloak:/opt/keycloak/data/import"
    command:
      - start-dev
      - --import-realm
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /realms/master/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q 200"]
      interval: 5s
      timeout: 3s
      retries: 24

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: quay.io/minio/minio
    ports:
      - "9000:9000"
      - "9090:9090"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    command:
      - server
      - /data
      - --console-address
      - ":9090"
